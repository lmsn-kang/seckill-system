# seckill-gateway/configs/nginx.conf
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 10240;
    use epoll;
}

http {
    # Nginx 限流区域定义
    limit_req_zone $binary_remote_addr zone=perip:10m rate=200r/s;
    limit_req_zone $server_name zone=global:1m rate=10000r/s;
    limit_conn_zone $binary_remote_addr zone=perip_conn:10m;

    log_format main '$remote_addr [$time_local] "$request" $status '
                    'rt=$request_time ut=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    upstream gateway {
        server gateway:8080;
        keepalive 64;
    }

    server {
        listen 80;
        client_max_body_size 1k;       # 秒杀请求体很小
        limit_conn perip_conn 50;       # 单IP最大50并发连接

        # ── 秒杀接口: 严格限流 ──
        location /api/seckill {
            limit_req zone=global burst=500 nodelay;
            limit_req zone=perip burst=50 nodelay;
            limit_req_status 429;

            proxy_pass http://gateway;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 3s;
            proxy_read_timeout 5s;
        }

        # ── 其他接口 ──
        location / {
            proxy_pass http://gateway;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── 限流错误页 ──
        error_page 429 = @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"code":429,"message":"rate limited (nginx)"}';
        }
    }
}
