syntax = "proto3";

package moderation;

option go_package = "seckill/llm-interface/pb";

service ModerationService {
  rpc Moderate (ModerationRequest) returns (ModerationResponse);
}

service InferenceWorker {
  rpc RunBatch (BatchRequest) returns (BatchResponse);
}

message ModerationRequest {
  string request_id   = 1;
  string text_content = 2;
  bytes  image_data   = 3;
}

message ModerationResponse {
  string             request_id  = 1;
  bool                is_safe     = 2;
  string              label       = 3;
  float               confidence  = 4;
  map<string, float>  all_scores  = 5;
  int64               latency_ms  = 6;
  bool                from_cache  = 7;
  string              error       = 8;
}

message BatchRequest {
  repeated InferenceItem items = 1;
}

message InferenceItem {
  string text_content = 1;
  bytes  image_data   = 2;
}

message BatchResponse {
  repeated InferenceResult results      = 1;
  int32                   inference_ms = 2;
}

message InferenceResult {
  bool                is_safe     = 1;
  string              label       = 2;
  float               confidence  = 3;
  map<string, float>  all_scores  = 4;
  string              error       = 5;
}